<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval castle defense - ForgeLoop</title>
  <meta name="description" content="Play medieval castle defense online for free. Generated by ForgeLoop AI game builder.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'JetBrains Mono', monospace;
      background: #0f0f0f;
      color: #fff;
      overflow: hidden;
    }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #5d9eff;
    }
    #score { color: #5d9eff; font-size: 24px; }
    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
  </div>
  <div id="controls">
    Arrow Keys: Move | Space: Action
  </div>
  <canvas id="game"></canvas>
  
  <script>
    // Auto-generated game: medieval castle defense
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let score = 0;
    const scoreEl = document.getElementById('score');
    
    // Game state
    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      size: 30,
      speed: 5,
      color: '#5d9eff'
    };
    
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);
    
    // Game objects
    const objects = [];
    for (let i = 0; i < 10; i++) {
      objects.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 20,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2
      });
    }
    
    function update() {
      // Player movement
      if (keys['ArrowLeft']) player.x -= player.speed;
      if (keys['ArrowRight']) player.x += player.speed;
      if (keys['ArrowUp']) player.y -= player.speed;
      if (keys['ArrowDown']) player.y += player.speed;
      
      // Keep player in bounds
      player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
      player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));
      
      // Update objects
      objects.forEach(obj => {
        obj.x += obj.vx;
        obj.y += obj.vy;
        
        // Bounce off walls
        if (obj.x < 0 || obj.x > canvas.width) obj.vx *= -1;
        if (obj.y < 0 || obj.y > canvas.height) obj.vy *= -1;
        
        // Collision with player
        const dx = player.x - obj.x;
        const dy = player.y - obj.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < player.size + obj.size) {
          score += 10;
          scoreEl.textContent = score;
          obj.x = Math.random() * canvas.width;
          obj.y = Math.random() * canvas.height;
        }
      });
    }
    
    function draw() {
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw player
      ctx.fillStyle = player.color;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw objects
      ctx.fillStyle = '#ff5d5d';
      objects.forEach(obj => {
        ctx.beginPath();
        ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
    
    // Handle resize
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
    
    // PostMessage bridge for workspace integration
    window.addEventListener('message', (e) => {
      if (e.data === 'GET_STATE') {
        window.parent.postMessage({
          type: 'GAME_STATE',
          score: score,
          concept: 'medieval castle defense'
        }, '*');
      }
    });
    
    // Notify workspace that game is ready
    window.parent.postMessage({ type: 'GAME_READY' }, '*');
  </script>
</body>
</html>
