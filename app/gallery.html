<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Gallery — RorkParity</title>
  <meta name="description" content="Browse AI-generated games built with RorkParity. Play instantly in your browser.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0f0f0f;
      color: #fff;
      padding: 40px 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 60px;
      font-size: 1.1rem;
    }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }
    .game-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
      transition: all 0.3s;
    }
    .game-card:hover {
      border-color: #5d9eff;
      transform: translateY(-4px);
    }
    .game-preview {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .game-info {
      padding: 20px;
    }
    .game-info h3 {
      margin-bottom: 10px;
      color: #fff;
    }
    .game-info p {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }
    .game-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 15px;
    }
    .play-button {
      display: inline-block;
      padding: 10px 24px;
      background: #5d9eff;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: all 0.3s;
      width: 100%;
      text-align: center;
    }
    .play-button:hover {
      background: #4a8eff;
    }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #666;
    }
    .empty-state h2 {
      margin-bottom: 20px;
      color: #aaa;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 40px;
      color: #5d9eff;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Back to Home</a>
    <h1>Game Gallery</h1>
    <p class="subtitle">All games generated by RorkParity AI</p>
    
    <div class="game-grid" id="gameGrid">
      <div class="empty-state">
        <h2>Loading games...</h2>
        <p>Fetching the latest AI-generated games</p>
      </div>
    </div>
  </div>

  <script>
    async function loadGames() {
      try {
        const response = await fetch('/api/games');
        const games = await response.json();
        
        const grid = document.getElementById('gameGrid');
        
        if (games.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <h2>No games yet</h2>
              <p>Be the first to generate a game!</p>
              <a href="/workspace.html" class="play-button" style="margin-top: 20px; display: inline-block; width: auto;">Start Building</a>
            </div>
          `;
          return;
        }
        
        grid.innerHTML = games.map(game => `
          <div class="game-card">
            <div class="game-preview">${game.emoji || '🎮'}</div>
            <div class="game-info">
              <h3>${game.title}</h3>
              <p>${game.description || 'AI-generated game'}</p>
              <div class="game-meta">
                <span>Created: ${new Date(game.created_at).toLocaleDateString()}</span>
                <span>Version: ${game.version || '1.0'}</span>
              </div>
              <a href="/games/${game.filename}" class="play-button">Play Now</a>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Failed to load games:', error);
        document.getElementById('gameGrid').innerHTML = `
          <div class="empty-state">
            <h2>Error loading games</h2>
            <p>${error.message}</p>
          </div>
        `;
      }
    }
    
    loadGames();
  </script>
</body>
</html>
