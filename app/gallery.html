<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Gallery — ForgeLoop</title>
  <meta name="description" content="Browse AI-generated games built with ForgeLoop. Play instantly in your browser.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0f0f0f;
      color: #fff;
      line-height: 1.6;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 20px 80px;
    }
    a { color: #5d9eff; text-decoration: none; }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .subtitle {
      color: #aaa;
      margin-bottom: 48px;
      font-size: 1.1rem;
    }
    .back-nav {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .game-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      transition: all 0.3s;
    }
    .game-card:hover {
      border-color: #5d9eff;
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }
    .game-preview {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .game-info {
      padding: 24px;
    }
    .game-info h3 {
      margin-bottom: 8px;
      font-size: 1.2rem;
    }
    .game-info p {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .game-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
    }
    .play-button {
      display: block;
      padding: 12px 24px;
      background: #5d9eff;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      transition: all 0.2s;
    }
    .play-button:hover {
      background: #4a8eff;
      transform: translateY(-1px);
    }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #666;
      grid-column: 1 / -1;
    }
    .empty-state h2 {
      color: #aaa;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="back-nav">
      <a href="/">← Home</a>
      <a href="/team.html">Team</a>
      <a href="/roadmap.html">Roadmap</a>
    </div>
    
    <h1>Game Gallery</h1>
    <p class="subtitle">Browse AI-generated games. Play instantly in your browser.</p>
    
    <div class="game-grid" id="gameGrid">
      <div class="empty-state">
        <h2>Loading games...</h2>
        <p>Fetching the latest AI-generated games</p>
      </div>
    </div>
  </div>

  <script>
    async function loadGames() {
      const grid = document.getElementById('gameGrid');
      const fallback = [
        {
          title: 'Zone Brawler',
          description: 'Fight through zones with increasing difficulty',
          filename: 'zone-brawler-v1.html',
          emoji: '⚔️',
          engine: 'Phaser 3',
          date: '2026-07-06'
        },
        {
          title: 'Medieval Castle Defense',
          description: 'Defend your castle from waves of enemies',
          filename: 'auto-20260706-medieval-castle-defense.html',
          emoji: '🏰',
          engine: 'Phaser 3',
          date: '2026-07-06'
        }
      ];
      
      try {
        const response = await fetch('/games/manifest.json?t=' + Date.now());
        const games = response.ok ? await response.json() : fallback;
        const safeGames = Array.isArray(games) && games.length ? games : fallback;
        
        grid.innerHTML = safeGames.map(game => `
          <div class="game-card">
            <div class="game-preview">${game.emoji || '🎮'}</div>
            <div class="game-info">
              <h3>${game.title}</h3>
              <p>${game.description || 'AI-generated game'}</p>
              <div class="game-meta">
                <span>${game.engine || 'Phaser 3'}</span>
                <span>${game.date || ''}</span>
              </div>
              <a href="/games/zone-brawler-v1.html" class="play-button">Play Now</a>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Failed to load games:', error);
        grid.innerHTML = fallback.map(game => `
          <div class="game-card">
            <div class="game-preview">${game.emoji}</div>
            <div class="game-info">
              <h3>${game.title}</h3>
              <p>${game.description}</p>
              <div class="game-meta">
                <span>${game.engine}</span>
                <span>${game.date}</span>
              </div>
              <a href="/games/zone-brawler-v1.html" class="play-button">Play Now</a>
            </div>
          </div>
        `).join('');
      }
    }
    
    loadGames();
  </script>
</body>
</html>
