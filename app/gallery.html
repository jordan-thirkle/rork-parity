<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForgeLoop Game Gallery</title>
  <meta name="description" content="Browse AI-generated games built with ForgeLoop.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#0f0f0f;color:#fff;font-family:'Space Grotesk',sans-serif}
    .wrap{max-width:1200px;margin:0 auto;padding:120px 20px 80px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;overflow:hidden}
    .card img{width:100%;height:180px;object-fit:cover;background:#222}
    .body{padding:16px}
    .meta{font-family:'JetBrains Mono',monospace;color:#aaa;font-size:12px}
    a{color:#5d9eff;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/">← Home</a>
    <h1>ForgeLoop Game Gallery</h1>
    <p style="color:#aaa">Live from Supabase when available; local manifest fallback otherwise.</p>
    <div class="grid" id="games"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const fallback = [
      {title:'Zone Brawler', slug:'zone-brawler-v1.html', summary:'Phaser brawler template', updated_at:'local'},
      {title:'Medieval Castle Defense', slug:'auto-20260706-medieval-castle-defense.html', summary:'Autogenerated defense game', updated_at:'local'}
    ];
    async function load(){
      let items = fallback;
      try {
        const url = localStorage.getItem('supabase:url') || 'https://xuwfpcogphhrkagwgzpf.supabase.co';
        const key = localStorage.getItem('supabase:anonKey') || 'sb_publishable_YSFRl77bFARtSluR4IDIUA_6xtc8cI-';
        const s = supabase.createClient(url, key);
        const { data } = await s.from('game_projects').select('id,title,updated_at,engine,status').order('updated_at', {ascending:false}).limit(24);
        if (data && data.length) items = data.map(p => ({title:p.title, slug:'workspace.html', summary:`${p.engine || 'Game'} • ${p.status || 'draft'}`, updated_at:p.updated_at}));
      } catch(e) {}
      document.getElementById('games').innerHTML = items.map(g => `
        <div class="card">
          <img alt="${g.title}" src="https://placehold.co/800x450/1a1a1a/ffffff?text=${encodeURIComponent(g.title)}">
          <div class="body">
            <h3>${g.title}</h3>
            <p>${g.summary}</p>
            <div class="meta">${g.updated_at}</div>
            <p><a href="/${g.slug}">Open</a></p>
          </div>
        </div>`).join('');
    }
    load();
  </script>
</body>
</html>
