<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForgeLoop 3D Team</title>
  <style>
    body{margin:0;background:#050505;color:#fff;font-family:Arial, sans-serif;overflow:hidden}
    canvas{display:block;width:100vw;height:100vh}
    .hud{position:fixed;top:16px;left:16px;background:rgba(0,0,0,.55);padding:12px 14px;border:1px solid #333;border-radius:12px;backdrop-filter:blur(10px);min-width:220px}
    .off{color:#ff6b6b}.on{color:#53e07d}.idle{color:#ffce5d}
    .agent{display:flex;align-items:center;gap:10px;margin-top:8px}
    .dot{width:10px;height:10px;border-radius:50%}
  </style>
</head>
<body>
  <div class="hud">
    <strong>ForgeLoop 3D Team</strong>
    <div id="status">loading…</div>
    <div id="agents"></div>
  </div>
  <canvas id="c"></canvas>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#050505');
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 20, 40);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;

    const ambient = new THREE.AmbientLight('#ffffff', 0.6);
    scene.add(ambient);
    const dir = new THREE.DirectionalLight('#ffffff', 1.2);
    dir.position.set(10, 20, 10);
    scene.add(dir);

    const group = new THREE.Group();
    scene.add(group);
    const agentMeshes = new Map();
    const statusColors = { online: '#53e07d', idle: '#ffce5d', offline: '#ff6b6b' };

    function setAgent(name, status){
      let mesh = agentMeshes.get(name);
      const color = statusColors[status] || statusColors.offline;
      if (!mesh) {
        const geo = new THREE.SphereGeometry(1.1, 32, 32);
        const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.2 });
        mesh = new THREE.Mesh(geo, mat);
        const ringGeo = new THREE.RingGeometry(1.4, 1.6, 48);
        const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI/2;
        mesh.add(ring);
        group.add(mesh);
        agentMeshes.set(name, mesh);
      } else {
        mesh.material.color.set(color);
        mesh.children[0].material.color.set(color);
      }
    }

    function layout(agents){
      const n = agents.length || 1;
      agents.forEach((a, i) => {
        const ang = (i / n) * Math.PI * 2;
        const r = 10;
        const x = Math.cos(ang) * r;
        const z = Math.sin(ang) * r;
        const mesh = agentMeshes.get(a.name);
        if (mesh) {
          mesh.position.set(x, 0, z);
          mesh.visible = true;
        }
      });
      const center = new THREE.Mesh(new THREE.SphereGeometry(1.8, 32, 32), new THREE.MeshStandardMaterial({ color: '#5d9eff', roughness: 0.25, metalness: 0.3 }));
      group.add(center);
      agentMeshes.set('__center', center);
    }

    function drawGround(){
      const grid = new THREE.GridHelper(80, 40, '#222', '#111');
      scene.add(grid);
    }
    drawGround();

    function updateHud(agents){
      document.getElementById('status').textContent = 'Updated ' + new Date().toLocaleTimeString();
      document.getElementById('agents').innerHTML = agents.map(a => {
        const cls = a.status === 'online' ? 'on' : a.status === 'idle' ? 'idle' : 'off';
        const color = statusColors[a.status] || statusColors.offline;
        return `<div class="agent"><span class="dot" style="background:${color}"></span><span>${a.name}: <span class="${cls}">${a.status}</span></span></div>`;
      }).join('');
    }

    async function load(){
      try {
        const res = await fetch('/status.json', { cache: 'no-store' });
        const data = await res.json();
        const agents = data.agents || [];
        agents.forEach(a => setAgent(a.name, a.status));
        updateHud(agents);
      } catch (e) {
        document.getElementById('status').textContent = 'offline';
      }
    }

    function animate(){
      requestAnimationFrame(animate);
      controls.update();
      const t = Date.now() * 0.001;
      agentMeshes.forEach((mesh, name) => {
        if (name === '__center') return;
        mesh.position.y = Math.sin(t + name.length) * 0.6;
        const ring = mesh.children[0];
        if (ring) ring.rotation.z = t * 0.5;
      });
      renderer.render(scene, camera);
    }
    animate();
    setInterval(load, 30000);
    load();
    addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
